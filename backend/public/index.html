<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zachery Glass</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #191A1B;
      color: #D4D4D4;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    main { text-align: center; padding: 2rem; }
    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      color: #E8E8E8;
      letter-spacing: -0.01em;
    }
    p {
      margin-top: 0.75rem;
      font-size: 0.875rem;
      color: #8A8F94;
    }
    nav { margin-top: 2rem; }
    a {
      display: inline-block;
      padding: 0.5rem 1.25rem;
      border: 1px solid #2E3234;
      border-radius: 4px;
      color: #4FA3CC;
      font-size: 0.8125rem;
      text-decoration: none;
    }
    a:hover { border-color: #297AA0; background: #121314; }
  </style>
</head>
<body>
  <main>
    <h1>Zachery Glass</h1>
    <p>Personal site</p>
    <nav>
      <a href="/private">Private</a>
    </nav>
  </main>
</body>
</html>
