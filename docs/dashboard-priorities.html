.form-range::-moz-range-track {
  height: 28px;
  background: transparent;
}

.form-range::-moz-range-thumb {

  height: 20px;

}

}

.btn:focus-visible {
  outline: 2px solid var(--ring);
  outline-offset: 2px;
}

svg {
  display: block;
  max-width: 100%;
  height: auto;
}

#widget &gt; svg {
  width: 100%;
}

.text-warning,
.text-destructive {
  color: var(--destructive);
}

  &lt;/section&gt;

  &lt;p class=&quot;sr-only&quot; id=&quot;dp-live&quot; aria-live=&quot;polite&quot;&gt;&lt;/p&gt;

  &lt;script&gt;
    (() =&gt; {
      const root = document.getElementById(&#x27;dashboard-priority-planner&#x27;);
      if (!root) return;

      const form = root.querySelector(&#x27;#dp-form&#x27;);
      const steps = Array.from(root.querySelectorAll(&#x27;.dp-step&#x27;));
      const progress = root.querySelector(&#x27;#dp-progress&#x27;);
      const stepBadge = root.querySelector(&#x27;#dp-step-badge&#x27;);
      const stepLabel = root.querySelector(&#x27;#dp-step-label&#x27;);
      const summary = root.querySelector(&#x27;#dp-summary&#x27;);
      const summaryContent = root.querySelector(&#x27;#dp-summary-content&#x27;);
      const summaryCount = root.querySelector(&#x27;#dp-summary-count&#x27;);
      const liveRegion = root.querySelector(&#x27;#dp-live&#x27;);
      const goalError = root.querySelector(&#x27;#dp-goal-error&#x27;);
      const sendStatus = root.querySelector(&#x27;#dp-send-status&#x27;);
      let currentStep = 0;
      let latestBrief = &#x27;&#x27;;

      const stepLabels = [
        &quot;Define the dashboard&#x27;s job&quot;,
        &#x27;Prioritize top-line numbers&#x27;,
        &#x27;Explain performance&#x27;,
        &#x27;Choose cash-flow detail&#x27;,
        &#x27;Select charts and features&#x27;,
        &#x27;Set density and reading order&#x27;,
        &#x27;Add your real-world context&#x27;,
      ];

      const goals = [
        &#x27;Where my net worth stands and why it changed&#x27;,
        &#x27;Whether my investments are performing well&#x27;,
        &#x27;How I compare with an appropriate benchmark&#x27;,
        &#x27;Whether cash flow and spending are on track&#x27;,
        &#x27;How much cash is available to deploy safely&#x27;,
        &#x27;Whether debt or liabilities need attention&#x27;,
        &#x27;Whether I am progressing toward financial goals&#x27;,
        &#x27;Where portfolio risk or concentration is building&#x27;,
        &#x27;What changed enough to deserve action&#x27;,
        &#x27;Whether all accounts and data are current&#x27;,
      ];

      const snapshotMetrics = [
        [&#x27;Net worth&#x27;, &#x27;Hero&#x27;],
        [&#x27;Net worth change for the selected period&#x27;, &#x27;Hero&#x27;],
        [&#x27;Total assets&#x27;, &#x27;Visible&#x27;],
        [&#x27;Total liabilities and debt&#x27;, &#x27;Visible&#x27;],
        [&#x27;Liquid cash available&#x27;, &#x27;Visible&#x27;],
        [&#x27;Invested portfolio value&#x27;, &#x27;Visible&#x27;],
        [&quot;Today&#x27;s dollar and percentage change&quot;, &#x27;Detail&#x27;],
        [&#x27;30-day change&#x27;, &#x27;Detail&#x27;],
        [&#x27;Year-to-date change&#x27;, &#x27;Visible&#x27;],
        [&#x27;Goal progress&#x27;, &#x27;Detail&#x27;],
        [&#x27;Data freshness and last sync&#x27;, &#x27;Visible&#x27;],
        [&#x27;Account errors or missing data&#x27;, &#x27;Visible&#x27;],
      ];

      const performanceMetrics = [
        [&#x27;Portfolio return for the selected period&#x27;, &#x27;Hero&#x27;],
        [&#x27;Return versus benchmark&#x27;, &#x27;Hero&#x27;],
        [&#x27;Investment gains versus contributions&#x27;, &#x27;Visible&#x27;],
        [&#x27;Time-weighted return&#x27;, &#x27;Detail&#x27;],
        [&#x27;Money-weighted return / IRR&#x27;, &#x27;Detail&#x27;],
        [&#x27;Best and worst holdings&#x27;, &#x27;Visible&#x27;],
        [&#x27;Asset allocation&#x27;, &#x27;Visible&#x27;],
        [&#x27;Allocation by account&#x27;, &#x27;Detail&#x27;],
        [&#x27;Top-five concentration&#x27;, &#x27;Visible&#x27;],
        [&#x27;Realized and unrealized gains&#x27;, &#x27;Detail&#x27;],
        [&#x27;Dividends and investment income&#x27;, &#x27;Detail&#x27;],
        [&#x27;Maximum drawdown&#x27;, &#x27;Detail&#x27;],
        [&#x27;Volatility or risk level&#x27;, &#x27;Detail&#x27;],
        [&#x27;Fees and estimated tax impact&#x27;, &#x27;Hide&#x27;],
      ];

      const cashflowMetrics = [
        [&#x27;Spending this month&#x27;, &#x27;Visible&#x27;],
        [&#x27;Income this month&#x27;, &#x27;Visible&#x27;],
        [&#x27;Net cash flow&#x27;, &#x27;Hero&#x27;],
        [&#x27;Savings rate&#x27;, &#x27;Visible&#x27;],
        [&#x27;Budget remaining&#x27;, &#x27;Detail&#x27;],
        [&#x27;Spending versus last month&#x27;, &#x27;Visible&#x27;],
        [&#x27;Spending by category&#x27;, &#x27;Detail&#x27;],
        [&#x27;Recurring charges and subscriptions&#x27;, &#x27;Detail&#x27;],
        [&#x27;Unusual or large transactions&#x27;, &#x27;Visible&#x27;],
        [&#x27;Upcoming bills&#x27;, &#x27;Detail&#x27;],
        [&#x27;Cash runway / months of expenses&#x27;, &#x27;Visible&#x27;],
        [&#x27;Debt payoff progress&#x27;, &#x27;Detail&#x27;],
        [&#x27;Projected end-of-month balance&#x27;, &#x27;Detail&#x27;],
      ];

      const chartOptions = [
        [&#x27;Net worth timeline&#x27;, &#x27;Visible&#x27;],
        [&#x27;Portfolio return versus benchmark&#x27;, &#x27;Visible&#x27;],
        [&#x27;Contributions versus investment growth&#x27;, &#x27;Detail&#x27;],
        [&#x27;Asset allocation donut&#x27;, &#x27;Visible&#x27;],
        [&#x27;Cash-flow trend&#x27;, &#x27;Visible&#x27;],
        [&#x27;Expense-category bars&#x27;, &#x27;Detail&#x27;],
        [&#x27;Drawdown / risk chart&#x27;, &#x27;Detail&#x27;],
        [&#x27;Goal projection&#x27;, &#x27;Detail&#x27;],
      ];

      const features = [
        &#x27;Date-range control shared across the page&#x27;,
        &#x27;Global account filter&#x27;,
        &#x27;Click any number to drill into its drivers&#x27;,
        &#x27;Compact sparklines beside key numbers&#x27;,
        &#x27;Compare with a previous period&#x27;,
        &#x27;Automatic plain-language insight summary&#x27;,
        &#x27;Annotations for major transfers or life events&#x27;,
        &#x27;Quick links to add or correct data&#x27;,
      ];

      const alerts = [
        &#x27;Spending is unusually high&#x27;,
        &#x27;Cash falls below a threshold&#x27;,
        &#x27;Portfolio concentration exceeds a threshold&#x27;,
        &#x27;Performance materially trails the benchmark&#x27;,
        &#x27;A large account balance changes&#x27;,
        &#x27;An account has stale or failed data&#x27;,
        &#x27;A budget or savings target is missed&#x27;,
        &#x27;A recurring bill changes or appears twice&#x27;,
      ];

      const priorityOptions = [
        [&#x27;Hero&#x27;, &#x27;Hero — above the fold&#x27;],
        [&#x27;Visible&#x27;, &#x27;Visible — regular module&#x27;],
        [&#x27;Detail&#x27;, &#x27;Detail — one click away&#x27;],
        [&#x27;Hide&#x27;, &#x27;Hide from dashboard&#x27;],
      ];

      function escapeHtml(value) {
        return String(value || &#x27;&#x27;)
          .replaceAll(&#x27;&amp;&#x27;, &#x27;&amp;amp;&#x27;)
          .replaceAll(&#x27;&lt;&#x27;, &#x27;&amp;lt;&#x27;)
          .replaceAll(&#x27;&gt;&#x27;, &#x27;&amp;gt;&#x27;)
          .replaceAll(&#x27;&quot;&#x27;, &#x27;&amp;quot;&#x27;)
          .replaceAll(&quot;&#x27;&quot;, &#x27;&amp;#039;&#x27;);
      }

      function slug(value) {
        return value.toLowerCase().replace(/[^a-z0-9]+/g, &#x27;-&#x27;).replace(/^-|-$/g, &#x27;&#x27;);
      }

      function renderChecks(targetId, items, name, defaults = []) {
        const target = root.querySelector(&#x27;#&#x27; + targetId);
        target.innerHTML = items.map((label, index) =&gt; {
          const id = `${name}-${index}`;
          const checked = defaults.includes(label) ? &#x27; checked&#x27; : &#x27;&#x27;;
          return `&lt;div class=&quot;form-check&quot;&gt;
            &lt;input class=&quot;form-check-input&quot; type=&quot;checkbox&quot; id=&quot;${id}&quot; name=&quot;${name}&quot; value=&quot;${escapeHtml(label)}&quot;${checked}&gt;
            &lt;label class=&quot;form-check-label&quot; for=&quot;${id}&quot;&gt;${escapeHtml(label)}&lt;/label&gt;
          &lt;/div&gt;`;
        }).join(&#x27;&#x27;);
      }

      function renderPriorities(targetId, items, group) {
        const target = root.querySelector(&#x27;#&#x27; + targetId);
        target.innerHTML = items.map(([label, selected], index) =&gt; {
          const id = `${group}-${index}-${slug(label)}`;
          const options = priorityOptions.map(([value, optionLabel]) =&gt;
            `&lt;option value=&quot;${value}&quot;${value === selected ? &#x27; selected&#x27; : &#x27;&#x27;}&gt;${optionLabel}&lt;/option&gt;`
          ).join(&#x27;&#x27;);
          return `&lt;div class=&quot;dp-priority-row&quot;&gt;
            &lt;label class=&quot;form-label&quot; for=&quot;${id}&quot;&gt;${escapeHtml(label)}&lt;/label&gt;
            &lt;select class=&quot;form-select&quot; id=&quot;${id}&quot; name=&quot;${id}&quot; data-priority data-group=&quot;${group}&quot; data-label=&quot;${escapeHtml(label)}&quot;&gt;${options}&lt;/select&gt;
          &lt;/div&gt;`;
        }).join(&#x27;&#x27;);
      }

      renderChecks(&#x27;dp-goal-options&#x27;, goals, &#x27;goals&#x27;);
      renderChecks(&#x27;dp-feature-options&#x27;, features, &#x27;features&#x27;, [
        &#x27;Date-range control shared across the page&#x27;,
        &#x27;Click any number to drill into its drivers&#x27;,
        &#x27;Compare with a previous period&#x27;,
      ]);
      renderChecks(&#x27;dp-alert-options&#x27;, alerts, &#x27;alerts&#x27;, [
        &#x27;Spending is unusually high&#x27;,
        &#x27;An account has stale or failed data&#x27;,
      ]);
      renderPriorities(&#x27;dp-snapshot-metrics&#x27;, snapshotMetrics, &#x27;Snapshot&#x27;);
      renderPriorities(&#x27;dp-performance-metrics&#x27;, performanceMetrics, &#x27;Performance&#x27;);
      renderPriorities(&#x27;dp-cashflow-metrics&#x27;, cashflowMetrics, &#x27;Cash flow&#x27;);
      renderPriorities(&#x27;dp-chart-options&#x27;, chartOptions, &#x27;Charts&#x27;);

      function valuesFor(name) {
        return Array.from(form.querySelectorAll(`[name=&quot;${name}&quot;]:checked`)).map(input =&gt; input.value);
      }

      function valueFor(name) {
        const field = form.elements[name];
        if (!field) return &#x27;&#x27;;
        if (field instanceof RadioNodeList) return field.value;
        return field.value;
      }

      function showStep(index) {
        currentStep = Math.max(0, Math.min(index, steps.length - 1));
        steps.forEach((step, stepIndex) =&gt; {
          step.hidden = stepIndex !== currentStep;
        });
        summary.hidden = true;
        form.hidden = false;
        progress.value = currentStep + 1;
        stepBadge.textContent = `Step ${currentStep + 1} of ${steps.length}`;
        stepLabel.textContent = stepLabels[currentStep];
        liveRegion.textContent = `${stepBadge.textContent}: ${stepLabels[currentStep]}`;
      }

      root.querySelectorAll(&#x27;[data-next]&#x27;).forEach(button =&gt; {
        button.addEventListener(&#x27;click&#x27;, () =&gt; {
          if (currentStep === 0 &amp;&amp; valuesFor(&#x27;goals&#x27;).length === 0) {
            goalError.hidden = false;
            return;
          }
          goalError.hidden = true;
          showStep(currentStep + 1);
        });
      });

      root.querySelectorAll(&#x27;[data-back]&#x27;).forEach(button =&gt; {
        button.addEventListener(&#x27;click&#x27;, () =&gt; showStep(currentStep - 1));
      });

      root.querySelector(&#x27;#dp-module-count&#x27;).addEventListener(&#x27;input&#x27;, event =&gt; {
        root.querySelector(&#x27;#dp-module-count-value&#x27;).textContent = event.target.value;
      });

      function priorityGroups() {
        const result = { Hero: [], Visible: [], Detail: [], Hide: [] };
        root.querySelectorAll(&#x27;[data-priority]&#x27;).forEach(select =&gt; {
          result[select.value].push(`${select.dataset.group}: ${select.dataset.label}`);
        });
        return result;
      }

      function optionalText(name) {
        return valueFor(name).trim() || &#x27;Not specified&#x27;;
      }

      function buildBrief() {
        const priorities = priorityGroups();
        const selectedGoals = valuesFor(&#x27;goals&#x27;);
        const selectedFeatures = valuesFor(&#x27;features&#x27;);
        const selectedAlerts = valuesFor(&#x27;alerts&#x27;);
        const heroLimit = Number(valueFor(&#x27;moduleCount&#x27;));
        const heroOverflow = Math.max(0, priorities.Hero.length - heroLimit);

        const lines = [
          &#x27;DASHBOARD DESIGN BRIEF&#x27;,
          &#x27;&#x27;,
          `Primary job: ${valueFor(&#x27;dashboardMode&#x27;)}`,
          `Usage: ${valueFor(&#x27;visitFrequency&#x27;)}; ${valueFor(&#x27;primaryDevice&#x27;)}; understood within ${valueFor(&#x27;glanceTime&#x27;)}`,
          `Layout: ${valueFor(&#x27;density&#x27;)} density, ${valueFor(&#x27;desktopColumns&#x27;)}, maximum ${heroLimit} above-the-fold modules`,
          `Mobile starts with: ${valueFor(&#x27;mobileFirst&#x27;)}`,
          `Money display: ${valueFor(&#x27;moneyDisplay&#x27;)}`,
          `Detail behavior: ${valueFor(&#x27;detailBehavior&#x27;)}`,
          &#x27;&#x27;,
          &#x27;The dashboard must answer:&#x27;,
          ...selectedGoals.map(item =&gt; `- ${item}`),
          &#x27;&#x27;,
          &#x27;Hero / above the fold:&#x27;,
          ...(priorities.Hero.length ? priorities.Hero.map(item =&gt; `- ${item}`) : [&#x27;- None selected&#x27;]),
          ...(heroOverflow ? [`- WARNING: ${heroOverflow} more hero items than the stated module limit`] : []),
          &#x27;&#x27;,
          &#x27;Visible dashboard modules:&#x27;,
          ...(priorities.Visible.length ? priorities.Visible.map(item =&gt; `- ${item}`) : [&#x27;- None selected&#x27;]),
          &#x27;&#x27;,
          &#x27;One-click detail:&#x27;,
          ...(priorities.Detail.length ? priorities.Detail.map(item =&gt; `- ${item}`) : [&#x27;- None selected&#x27;]),
          &#x27;&#x27;,
          &#x27;Keep off the dashboard:&#x27;,
          ...(priorities.Hide.length ? priorities.Hide.map(item =&gt; `- ${item}`) : [&#x27;- None selected&#x27;]),
          &#x27;&#x27;,
          `Performance defaults: ${valueFor(&#x27;defaultPeriod&#x27;)} compared with ${valueFor(&#x27;benchmark&#x27;)}`,
          &#x27;&#x27;,
          &#x27;Interactions:&#x27;,
          ...(selectedFeatures.length ? selectedFeatures.map(item =&gt; `- ${item}`) : [&#x27;- No extras selected&#x27;]),
          &#x27;&#x27;,
          &#x27;Alerts:&#x27;,
          ...(selectedAlerts.length ? selectedAlerts.map(item =&gt; `- ${item}`) : [&#x27;- No alerts selected&#x27;]),
          &#x27;&#x27;,
          &#x27;Real questions:&#x27;,
          optionalText(&#x27;topQuestions&#x27;),
          &#x27;&#x27;,
          &#x27;Actions this should support:&#x27;,
          optionalText(&#x27;desiredActions&#x27;),
          &#x27;&#x27;,
          &#x27;Current waste:&#x27;,
          optionalText(&#x27;currentWaste&#x27;),
          &#x27;&#x27;,
          &#x27;Missing or untrusted information:&#x27;,
          optionalText(&#x27;missingInfo&#x27;),
          &#x27;&#x27;,
          &#x27;Success definition:&#x27;,
          optionalText(&#x27;successDefinition&#x27;),
        ];

        return {
          text: lines.join(&#x27;\n&#x27;),
          priorities,
          selectedGoals,
          selectedFeatures,
          selectedAlerts,
          heroLimit,
          heroOverflow,
        };
      }

      function listMarkup(items, fallback) {
        const values = items.length ? items : [fallback];
        return `&lt;ul class=&quot;dp-summary-list&quot;&gt;${values.map(item =&gt; `&lt;li&gt;${escapeHtml(item)}&lt;/li&gt;`).join(&#x27;&#x27;)}&lt;/ul&gt;`;
      }

      function renderSummary(brief) {
        latestBrief = brief.text;
        summaryCount.textContent = `${brief.priorities.Hero.length} hero priorities · ${brief.priorities.Visible.length} visible modules`;
        summaryContent.innerHTML = `
          &lt;div class=&quot;dp-summary-section&quot;&gt;
            &lt;div&gt;
              &lt;h3&gt;North star&lt;/h3&gt;
              ${listMarkup(brief.selectedGoals, &#x27;No primary questions selected&#x27;)}
            &lt;/div&gt;
            &lt;div&gt;
              &lt;h3&gt;Above the fold&lt;/h3&gt;
              ${listMarkup(brief.priorities.Hero, &#x27;No hero metrics selected&#x27;)}
              ${brief.heroOverflow ? `&lt;p class=&quot;text-destructive&quot;&gt;You selected ${brief.heroOverflow} more hero items than your ${brief.heroLimit}-module limit. The redesign should force a ranking.&lt;/p&gt;` : &#x27;&#x27;}
            &lt;/div&gt;
            &lt;div&gt;
              &lt;h3&gt;Regular modules&lt;/h3&gt;
              ${listMarkup(brief.priorities.Visible, &#x27;No regular modules selected&#x27;)}
            &lt;/div&gt;
            &lt;div&gt;
              &lt;h3&gt;Interactions and alerts&lt;/h3&gt;
              ${listMarkup([...brief.selectedFeatures, ...brief.selectedAlerts], &#x27;No proactive features selected&#x27;)}
            &lt;/div&gt;
            &lt;details&gt;
              &lt;summary&gt;Review the complete brief&lt;/summary&gt;
              &lt;pre class=&quot;dp-brief&quot;&gt;&lt;code&gt;${escapeHtml(brief.text)}&lt;/code&gt;&lt;/pre&gt;
            &lt;/details&gt;
          &lt;/div&gt;`;
        form.hidden = true;
        summary.hidden = false;
        stepBadge.textContent = &#x27;Complete&#x27;;
        stepLabel.textContent = &#x27;Dashboard brief ready&#x27;;
        progress.value = steps.length;
        liveRegion.textContent = &#x27;Dashboard brief ready for review.&#x27;;
      }

      form.addEventListener(&#x27;submit&#x27;, event =&gt; {
        event.preventDefault();
        renderSummary(buildBrief());
      });

      root.querySelector(&#x27;#dp-revise&#x27;).addEventListener(&#x27;click&#x27;, () =&gt; {
        sendStatus.textContent = &#x27;&#x27;;
        showStep(0);
      });

      root.querySelector(&#x27;#dp-copy&#x27;).addEventListener(&#x27;click&#x27;, async () =&gt; {
        try {
          await navigator.clipboard.writeText(latestBrief);
          sendStatus.textContent = &#x27;Brief copied.&#x27;;
        } catch (error) {
          sendStatus.textContent = &#x27;Copy was blocked. Open the complete brief and copy it manually.&#x27;;
        }
      });

      root.querySelector(&#x27;#dp-send&#x27;).addEventListener(&#x27;click&#x27;, async () =&gt; {
        const prompt = `Use this dashboard design brief to propose a lean main-dashboard layout. Identify conflicts, recommend the exact above-the-fold hierarchy for desktop and mobile, and ask only the follow-up questions that materially change the design.\n\n${latestBrief}`;
        if (window.openai &amp;&amp; typeof window.openai.sendFollowUpMessage === &#x27;function&#x27;) {
          await window.openai.sendFollowUpMessage({
            title: &#x27;Design the dashboard from this brief&#x27;,
            prompt,
          });
          sendStatus.textContent = &#x27;Brief sent to Codex.&#x27;;
        } else {
          try {
            await navigator.clipboard.writeText(prompt);
            sendStatus.textContent = &#x27;Brief copied. Paste it into your next message.&#x27;;
          } catch (error) {
            sendStatus.textContent = &#x27;Open the complete brief and copy it into your next message.&#x27;;
          }
        }
      });

      showStep(0);
    })();
  &lt;/script&gt;
&lt;/div&gt;

&lt;script src=&quot;https://unpkg.com/@floating-ui/core@1.7.3/dist/floating-ui.core.umd.min.js&quot;&gt;&lt;/script&gt;
&lt;script src=&quot;https://unpkg.com/@floating-ui/dom@1.7.4/dist/floating-ui.dom.umd.min.js&quot;&gt;&lt;/script&gt;
&lt;script&gt;
(() =&gt; {
  if (window.FloatingUIDOM == null) {
    return;
  }
  const { autoUpdate, computePosition, flip, offset, shift, size } =
    window.FloatingUIDOM;
  const tooltipPlacements = new Set([&quot;top&quot;, &quot;right&quot;, &quot;bottom&quot;, &quot;left&quot;]);
  const tooltipId = `codex-visualization-tooltip-${
    window.crypto?.randomUUID?.() ?? Date.now().toString(36)
  }`;
  const tooltipGap = 5;
  const hoverDelay = 700;
  const skipDelay = 300;
  let activeTrigger = null;
  let pendingTrigger = null;
  let tooltip = null;
  let openTimeout = null;
  let autoUpdateCleanup = null;
  let positionRequest = 0;
  let skipDelayUntil = 0;

  const getTrigger = (target) =&gt;
    target?.nodeType === Node.ELEMENT_NODE
      ? target.closest(&quot;[data-tooltip]&quot;)
      : null;
  const containsTarget = (trigger, target) =&gt;
    target?.nodeType != null &amp;&amp; trigger.contains(target);
  const getContent = (trigger) =&gt;
    trigger.getAttribute(&quot;data-tooltip&quot;)?.trim() ?? &quot;&quot;;
  const getPlacement = (trigger) =&gt; {
    const placement = trigger.getAttribute(&quot;data-tooltip-placement&quot;);
    return tooltipPlacements.has(placement) ? placement : &quot;top&quot;;
  };
  const getTooltip = () =&gt; {
    if (tooltip == null) {
      tooltip = document.createElement(&quot;div&quot;);
      tooltip.id = tooltipId;
      tooltip.className = &quot;tooltip&quot;;
      tooltip.setAttribute(&quot;role&quot;, &quot;tooltip&quot;);
    }
    return tooltip;
  };
  const setDescribedBy = (trigger, described) =&gt; {
    const ids = new Set(
      (trigger.getAttribute(&quot;aria-describedby&quot;) ?? &quot;&quot;)
        .split(/\s+/)
        .filter(Boolean),
    );
    if (described) {
      ids.add(tooltipId);
    } else {
      ids.delete(tooltipId);
    }
    if (ids.size === 0) {
      trigger.removeAttribute(&quot;aria-describedby&quot;);
    } else {
      trigger.setAttribute(&quot;aria-describedby&quot;, [...ids].join(&quot; &quot;));
    }
  };
  const clearOpenTimeout = () =&gt; {
    if (openTimeout != null) {
      window.clearTimeout(openTimeout);
      openTimeout = null;
    }
    pendingTrigger = null;
  };
  const closeTooltip = (activateSkipDelay = true) =&gt; {
    clearOpenTimeout();
    positionRequest += 1;
    autoUpdateCleanup?.();
    autoUpdateCleanup = null;
    if (activeTrigger == null) {
      return;
    }
    setDescribedBy(activeTrigger, false);
    activeTrigger = null;
    tooltip?.remove();
    if (activateSkipDelay) {
      skipDelayUntil = Date.now() + skipDelay;
    }
  };
  const updatePosition = (trigger, floating) =&gt; {
    const request = ++positionRequest;
    void computePosition(trigger, floating, {
      middleware: [
        offset(tooltipGap),
        flip({ padding: tooltipGap }),
        shift({ padding: tooltipGap }),
        size({
          padding: tooltipGap,
          apply({ availableHeight, availableWidth, elements }) {
            elements.floating.style.setProperty(
              &quot;--tooltip-available-width&quot;,
              `${Math.max(0, availableWidth)}px`,
            );
            elements.floating.style.setProperty(
              &quot;--tooltip-available-height&quot;,
              `${Math.max(0, availableHeight)}px`,
            );
          },
        }),
      ],
      placement: getPlacement(trigger),
