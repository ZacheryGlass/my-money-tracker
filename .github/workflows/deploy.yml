name: Deploy to Azure App Service

# DB migrations are not run here: the App Service startup command is
# "cd /home/site/wwwroot/backend && npm run start:prod", which applies
# backend/migrations/ before starting the server. Migrations must stay
# idempotent -- scripts/migrate.js re-runs every file on each boot.

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: zacheryglass-money

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      # VITE_API_URL is unset in CI, so the build defaults to same-origin.
      - name: Build frontend
        run: |
          npm ci --prefix frontend
          npm run build --prefix frontend

      # Installs linux-x64 binaries (bcrypt) matching the App Service runtime.
      - name: Install backend production deps
        run: npm ci --omit=dev --prefix backend

      - name: Package app
        run: zip -qr deploy.zip backend frontend/dist

      - name: Deploy
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: deploy.zip
